# KlipperScreen.conf
# Hardware: BIGTREETECH HDMI7 V1.2 (1024x600, capacitive touch, plug-and-play via HDMI + USB-C)
# Firmware: Kalico (Danger-Klipper fork) -- KlipperScreen talks to Moonraker's API, which
#           Kalico implements the same as mainline Klipper, so no fork-specific settings needed.

[main]
# Printer this screen connects to by default )
default_printer = printer

# UI language
language = en

# Use the metadata embedded in the gcode file for time/progress estimates (more accurate than slicer-only estimate)
print_estimate_method = file

# Turn the screen off after this many seconds of inactivity. 0 = never blank.
# 1024x600 panels run a bit warm; many people leave this at 0 or a few thousand seconds.
screen_blanking = 0

# 24-hour clock in the top bar
24htime = true

# Show quick macro shortcuts on the side panel
side_macro_shortcut = true

# How to sort the print/file list
print_sort_dir = name_asc

# --- Screen rotation (uncomment ONE line below only if the panel is mounted upside-down/sideways) ---
# BTT HDMI7 has a physical Ks2 button for 180° rotation already, so you usually do NOT need this.
# rotate = 180
# rotate = 90
# rotate = 270

[printer printer]
# Moonraker connection -- adjust host/port only if Moonraker runs on a different
# machine/port than the default. "printer" here must match default_printer above.
moonraker_host = 127.0.0.1
moonraker_port = 7125
moonraker_api_key = false

