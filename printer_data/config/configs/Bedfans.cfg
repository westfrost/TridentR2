############### Bed Fan Config ###############

[gcode_macro bedfanvars]
variable_threshold: 55         # Enable chamber fan control only when bed target is at/above this temp
variable_fast: 0.8             # Maximum BedFan speed after post-heat delay has completed
variable_ramp: 0.5             # BedFan speed used after bed reaches target before switching to full speed
variable_medium: 0.35          # BedFan speed used for chamber temperature stabilization
variable_slow: 0.2             # BedFan speed while bed is still heating
variable_idle: 0.1             # Minimum BedFan speed - fans never go below this (never fully off)
variable_chamber_limit: 65     # Chamber temperature limit before reducing BedFan speed
variable_chamber_resume: 60    # Temperature where maximum BedFan speed is allowed again (prevents rapid fan switching)
variable_loop_time: 2          # Delay (seconds) between control loop updates
variable_postheat_delay: 60    # Delay (seconds) from reaching bed temp until BedFan fast speed is allowed
gcode:

############### Fans ###############

[fan_generic BedFan]
pin: PA9
kick_start_time: 0.5

############### Fan Speed Presets ###############

[gcode_macro BedFansSlow]
gcode:
    {% set SLOW = printer["gcode_macro bedfanvars"].slow|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={SLOW}

[gcode_macro BedFansRamp]
gcode:
    {% set RAMP = printer["gcode_macro bedfanvars"].ramp|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={RAMP}

[gcode_macro BedFansMedium]
gcode:
    {% set MEDIUM = printer["gcode_macro bedfanvars"].medium|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={MEDIUM}

[gcode_macro BedFansFast]
gcode:
    {% set FAST = printer["gcode_macro bedfanvars"].fast|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={FAST}

[gcode_macro BedFansIdle]
gcode:
    {% set IDLE = printer["gcode_macro bedfanvars"].idle|float %}
    SET_FAN_SPEED FAN=BedFan SPEED={IDLE}

# Manual override only - the automatic logic never calls this
[gcode_macro BedFansOff]
gcode:
    SET_FAN_SPEED FAN=BedFan SPEED=0

############### Runtime State ###############

[gcode_macro bedfanstate]
variable_hot_chamber: 0        # Internal flag: 1 = chamber above limit (forces medium mode until cooled)
variable_ramp_stage: 0         # 0 = heating, 1 = ramp active, 2 = fast allowed
gcode:

############### Control Logic ###############

[gcode_macro BEDFAN_UPDATE]
gcode:
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set CHAMBER_LIMIT = printer["gcode_macro bedfanvars"].chamber_limit|float %}
    {% set CHAMBER_RESUME = printer["gcode_macro bedfanvars"].chamber_resume|float %}
    {% set BED_TARGET = printer.heater_bed.target|float %}
    {% set BED_TEMP = printer.heater_bed.temperature|float %}
    {% set CHAMBER_TEMP = printer["temperature_sensor chamber"].temperature|float %}
    {% set HOT = printer["gcode_macro bedfanstate"].hot_chamber|int %}
    {% set RAMP_STAGE = printer["gcode_macro bedfanstate"].ramp_stage|int %}
    {% set POSTHEAT_DELAY = printer["gcode_macro bedfanvars"].postheat_delay|int %}

    # Drop to idle speed if bed target is below threshold (never fully off)
    {% if BED_TARGET < THRESHOLD %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
        UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
        BedFansIdle

    # Chamber protection mode: stay on medium until cooled below resume temperature
    {% elif HOT == 1 %}
        {% if CHAMBER_TEMP <= CHAMBER_RESUME %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0

            {% if RAMP_STAGE >= 2 %}
                BedFansFast
            {% elif RAMP_STAGE == 1 %}
                BedFansRamp
            {% else %}
                {% if BED_TEMP >= (BED_TARGET - 1) %}
                    SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=1
                    UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION={POSTHEAT_DELAY}
                    BedFansRamp
                {% else %}
                    BedFansSlow
                {% endif %}
            {% endif %}
        {% else %}
            BedFansMedium
        {% endif %}

    # Enter chamber protection mode
    {% elif CHAMBER_TEMP >= CHAMBER_LIMIT %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=1
        BedFansMedium

    # First time reaching temp -> start ramp timer once
    {% elif BED_TEMP >= (BED_TARGET - 1) and RAMP_STAGE == 0 %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=1
        UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION={POSTHEAT_DELAY}
        BedFansRamp

    # Waiting for delayed fast ramp
    {% elif RAMP_STAGE == 1 %}
        BedFansRamp

    # Fast allowed
    {% elif RAMP_STAGE >= 2 %}
        BedFansFast

    # Heating phase
    {% else %}
        BedFansSlow
    {% endif %}

############### Command Overrides ###############

[gcode_macro SET_HEATER_TEMPERATURE]
rename_existing: _SET_HEATER_TEMPERATURE
gcode:
    {% set HEATER = params.HEATER|default("None") %}
    {% set TARGET = params.TARGET|default(0)|int %}
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}

    {% if HEATER|lower == "extruder" %}
        M104 S{TARGET}
    {% elif HEATER|lower == "heater_bed" %}
        M99140 S{TARGET}
    {% else %}
        {action_respond_info("Heater %s not supported" % HEATER)}
    {% endif %}

    {% if HEATER|lower == "heater_bed" %}
        {% if TARGET >= THRESHOLD %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
            BedFansSlow
            NeverMoreFast
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
            UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
            SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
            BedFansIdle
            UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
            UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
        {% endif %}
    {% endif %}

[gcode_macro M190]
rename_existing: M99190
gcode:
    {% set S = params.S|int %}
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}

    {% if S >= THRESHOLD %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
        BedFansSlow
        NeverMoreFast
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=1
        UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
    {% else %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
        BedFansIdle
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
        UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
    {% endif %}

    M140 {% for p in params %}{'%s%s' % (p, params[p])}{% endfor %}

    {% if S != 0 %}
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={S|int} MAXIMUM={S|int + 5}
    {% endif %}

    {% if S >= THRESHOLD %}
        BEDFAN_UPDATE
    {% endif %}

[gcode_macro M140]
rename_existing: M99140
gcode:
    {% set S = params.S|float %}
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={S}

[gcode_macro TURN_OFF_HEATERS]
rename_existing: _TURN_OFF_HEATERS
gcode:
    SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
    SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
    UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
    BedFansIdle
    _TURN_OFF_HEATERS

############### Monitoring Loop ###############

[delayed_gcode bedfanloop]
gcode:
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set LOOP_TIME = printer["gcode_macro bedfanvars"].loop_time|int %}
    {% set BED_TARGET = printer.heater_bed.target|float %}

    {% if BED_TARGET >= THRESHOLD %}
        BEDFAN_UPDATE
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION={LOOP_TIME}
    {% else %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=hot_chamber VALUE=0
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
        UPDATE_DELAYED_GCODE ID=bedfan_fast_ramp DURATION=0
        BedFansIdle
        UPDATE_DELAYED_GCODE ID=bedfanloop DURATION=0
    {% endif %}

############### Delayed Fast Ramp ###############

[delayed_gcode bedfan_fast_ramp]
gcode:
    {% set THRESHOLD = printer["gcode_macro bedfanvars"].threshold|int %}
    {% set BED_TARGET = printer.heater_bed.target|float %}

    {% if BED_TARGET >= THRESHOLD %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=2
    {% else %}
        SET_GCODE_VARIABLE MACRO=bedfanstate VARIABLE=ramp_stage VALUE=0
    {% endif %}