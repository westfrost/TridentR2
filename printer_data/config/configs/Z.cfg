##  Z0 Stepper - Front Left
[stepper_z]
step_pin: PC13
dir_pin: !PF0                 # behold evt. "!" fra din gamle config
enable_pin: !PF1
rotation_distance: 4    
microsteps: 16
endstop_pin: probe:z_virtual_endstop
position_max: 250
position_min: -4.5
homing_speed: 15
second_homing_speed: 3
homing_retract_dist: 3

##  Z1 Stepper - Rear Center
[stepper_z1]
step_pin: PE2
dir_pin: !PE3                 # behold evt. "!"
enable_pin: !PD4
rotation_distance: 4  
microsteps: 16

##  Z2 Stepper - Front Right
[stepper_z2]
step_pin: PE6
dir_pin: !PA14                # behold evt. "!"
enable_pin: !PE0
rotation_distance: 4  
microsteps: 16

[tmc2209 stepper_z]
uart_pin: PE4
#interpolate: False
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z1]
uart_pin: PE1
#interpolate: False
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0

[tmc2209 stepper_z2]
uart_pin: PD3
#interpolate: False
run_current: 0.65
sense_resistor: 0.110
stealthchop_threshold: 0