# =========================================================
# TMC Autotune config (Kalico)
#
# XY:       StepperOnline 17HS19-2504S-H  -> omc-17hs19-2504s-h
# Extruder: Moons' CSE14HRA1L410A (3DO NEMA14 36mm 10T HT)
#           -> moons-cse14hra1l410a
#
# Begge motorer findes allerede i plugin'ets motor_database.cfg,
# saa der skal ikke defineres [motor_constants] manuelt.
# =========================================================
#
# Gem som fx ~/printer_data/config/autotune_tmc.cfg
# og tilfoej i printer.cfg:
#   [include autotune_tmc.cfg]
#
# VIGTIGT:
# - Sektionsnavnene skal matche dine stepper-navne i printer.cfg.
# - Behold dine normale [tmc2209 ...]/[tmc5160 ...] sektioner med
#   run_current og interpolate: True. Autotune styrer resten
#   (hysterese, PWM-parametre, stealth/spreadcycle-skift m.m.).
# - Saet "voltage" til din faktiske motor-forsyningsspaending
#   (typisk 24 V).

[autotune_tmc stepper_x]
motor: omc-17hs19-2504s-h
tuning_goal: auto
voltage: 24
sg4_thrs: 60        # Kun ved sensorless homing (TMC2209).

[autotune_tmc stepper_y]
motor: omc-17hs19-2504s-h
tuning_goal: auto
voltage: 24
sg4_thrs: 60

[autotune_tmc extruder]
motor: moons-cse14hra1l410a
tuning_goal: performance
voltage: 24

[autotune_tmc stepper_z]
motor: ldo-42sth40-1684l300e
tuning_goal: performance
voltage: 24

[autotune_tmc stepper_z1]
motor: ldo-42sth40-1684l300e
tuning_goal: performance
voltage: 24

[autotune_tmc stepper_z2]
motor: ldo-42sth40-1684l300e
tuning_goal: performance
voltage: 24

# "performance" anbefales generelt til extrudere - de koerer ved
# lave hastigheder med hurtige retningsskift (pressure advance),
# hvor spreadCycle giver mest konsistent moment.
# Vil du have den mere stille, saa proev tuning_goal: auto.

# ---------------------------------------------------------
# Z-motorer: tilfoejes senere, naar du har modelnummeret.
# Skabelon (udfyld motor-navnet fra motor_database.cfg):
#
#[autotune_tmc stepper_z]
#motor: <motornavn>
#tuning_goal: silent
#voltage: 24
# ---------------------------------------------------------

# =========================================================
# Valgfrie parametre (kan tilfoejes i hver sektion):
#
# tuning_goal: auto | silent | performance | autoswitch
#   auto        - vaelger selv ud fra din oevrige config
#   silent      - stealthChop hele tiden, mest lydloes
#   performance - spreadCycle, maks moment/hastighed, mere stoej
#   autoswitch  - skifter stealth/spread ved en taerskel
#                 (kan give artefakter ved skiftet)
#
# extra_hysteresis: 0    # 0-8. Proev 1-2 hvis motorerne "synger"
#                        # ved lave hastigheder. Mere = mere varme.
# tbl: 2                 # Comparator blank time (0-3).
# toff: 0                # 0 = autotune vaelger selv.
# pwm_freq_target: 55e3  # Maal-PWM-frekvens (saenk evt. til 37e3
#                        # hvis driverne bliver meget varme).
# overvoltage_vth: 24.5  # Kun TMC2240/5160: PSU-spaending + ~0.8 V.
# =========================================================